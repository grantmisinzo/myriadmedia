<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Myriad Media</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo"><span>Myriad</span> Media</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="pricing.html">Pricing</a>
      <a href="faq.html">FAQ</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <section class="page-header">
    <h1>Get in <span class="accent">Touch</span></h1>
    <p>Have questions? We're here to help.</p>
  </section>

  <section class="contact-section">
    <form id="contactForm" class="contact-form">
      <label>Name</label>
      <input type="text" name="name" required>
      <label>Email</label>
      <input type="email" name="email" required>
      <label>Message</label>
      <textarea name="message" rows="5" required></textarea>
      <button type="submit" class="btn btn-primary btn-block">Send via WhatsApp</button>
    </form>

    <div class="contact-cta">
      <p>Or reach us directly on WhatsApp</p>
      <a href="https://wa.me/message/C4VHC5LC3PQZE1" target="_blank">Chat with us on WhatsApp</a>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Myriad Media. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
